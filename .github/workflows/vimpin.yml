name: vimpin

on:
  pull_request:
    paths:
      - "home/dot_config/nvim/**"
      - ".github/workflows/vimpin.yml"
  push:
    branches: [main]
    paths:
      - "home/dot_config/nvim/**"
      - ".github/workflows/vimpin.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install vimpin
        run: go install github.com/gr1m0h/vimpin/cmd/vimpin@v0.1.0

      - name: Offline structural check (every spec is in canonical form)
        working-directory: home/dot_config/nvim
        run: vimpin run --no-api --check

      - name: Annotation drift verification (tag annotations match commit)
        working-directory: home/dot_config/nvim
        run: vimpin run --verify --check
